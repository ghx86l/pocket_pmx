<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D2D2D">
<link rel="manifest" href="./manifest.json">
<title>PocketPMX</title>
<style>
  :root { --stage: #2D2D2D; --panel: #16191f; --line: #555; --text: #fff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--stage); color: var(--text); font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  button, input, select { font: inherit; color: var(--text); }
  button { cursor: pointer; }
  #toggle, #fullscreen { position: fixed; top: 12px; z-index: 30; width: 44px; height: 44px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); font-size: 20px; display: flex; align-items: center; justify-content: center; }
  #toggle { left: 12px; }
  #toggle img { width: 22px; height: 22px; display: block; pointer-events: none; }
  #fullscreen { right: 12px; }
  #toolbar { position: fixed; top: 12px; left: 64px; right: 64px; z-index: 30; height: 44px; display: flex; gap: 4px; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #toolbar::-webkit-scrollbar { display: none; }
  .menuToggle { flex: 0 0 auto; height: 44px; padding: 0 14px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); font-size: 12px; font-weight: 700; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
  #logPanel { position: fixed; left: 8px; right: 8px; bottom: 58px; z-index: 10; display: none; }
  #logPanel.open { display: block; }
  #logCopy { height: 28px; padding: 0 12px; border: 1px solid var(--line); background: var(--panel); color: var(--text); font-size: 12px; margin-bottom: 4px; cursor: pointer; }
  #logBox { font-size: 11px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; background: rgba(0,0,0,.75); padding: 8px; border: 1px solid var(--line); max-height: 35vh; overflow: auto; }
  #codePanel { position: fixed; left: 8px; right: 8px; bottom: 58px; z-index: 10; display: none; }
  #codePanel.open { display: block; }
  #codeBar { display: flex; gap: 4px; margin-bottom: 4px; }
  #codeBar button { height: 28px; padding: 0 12px; border: 1px solid var(--line); background: var(--panel); color: var(--text); font-size: 12px; cursor: pointer; }
  #codeBox { width: 100%; height: 30vh; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.4; background: rgba(0,0,0,.75); color: var(--text); padding: 8px; border: 1px solid var(--line); outline: none; resize: vertical; white-space: pre; }
  .transformGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
  .transformGrid label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text); }
  .transformGrid input { width: 100%; height: 32px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); outline: none; padding: 0 6px; }
  #bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 15; height: 52px; display: flex; align-items: center; gap: 8px; padding: 0 10px; border-top: 1px solid var(--line); border-left: 0; border-right: 0; border-bottom: 0; border-radius: 0; background: var(--panel); }
  #play, #physicsReset { width: 32px; height: 32px; padding: 0; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 0; background: var(--stage); color: var(--text); display: flex; align-items: center; justify-content: center; }
  #play img, #physicsReset img { width: 18px; height: 18px; display: block; pointer-events: none; }
  #frame { width: 70px; height: 30px; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 0; background: var(--stage); color: var(--text); font-size: 13px; text-align: center; outline: none; }
  #seek { flex: 1 1 auto; min-width: 30px; accent-color: var(--text); }
  #frameTotal { min-width: 42px; flex: 0 0 auto; font-size: 12px; color: var(--text); }
  #fps { position: fixed; right: 8px; bottom: 58px; z-index: 16; min-width: 38px; padding: 2px 4px; border: 1px solid var(--line); background: rgba(0,0,0,.35); color: var(--text); font-size: 10px; line-height: 1.2; text-align: right; }
  button:disabled, input:disabled, select:disabled { opacity: .45; cursor: default; }
  input[type="file"] { display: none; }
  #panel { position: fixed; z-index: 25; left: 0; right: 0; bottom: 0; max-height: 78vh; overflow-y: auto; background: var(--stage); border-top: 1px solid var(--line); padding: 18px 16px calc(18px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform .18s linear; }
  #panel.open { transform: translateY(0); }
  #settingsPanel { position: fixed; z-index: 25; top: 68px; left: 12px; width: min(340px, calc(100vw - 24px)); max-height: calc(100vh - 140px); overflow-y: auto; background: var(--stage); border: 1px solid var(--line); padding: 16px; display: none; }
  #settingsPanel.open { display: block; }
  .brand { margin: 0 0 16px; }
  .brand b { font-size: 17px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; color: var(--text); }
  .field { margin-bottom: 14px; }
  .field > i { display: block; font-style: normal; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }
  .pick { display: flex; align-items: center; gap: 10px; }
  button.file, button.act { min-height: 42px; padding: 0 16px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); font-size: 14px; font-weight: 600; }
  .actions { display: flex; gap: 10px; }
  button.act { flex: 1; height: 48px; font-size: 15px; }
  select { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); outline: none; padding: 0 8px; }
  input[type="number"] { border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); outline: none; }
  input[type="color"] { width: 100%; height: 36px; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); outline: none; padding: 0; }
  .pick select { width: auto; min-width: 96px; }
  .qualityBlock { display: grid; gap: 8px; }
  .menuPage { display: none; }
  .menuPage.active { display: block; }
  .settingRow { display: grid; grid-template-columns: minmax(110px,150px) minmax(150px,1fr); gap: 8px; align-items: center; color: var(--text); font-size: 14px; }
  .settingRow select, .settingRow input[type="number"] { width: 100%; height: 36px; }
  .settingRow input[type="number"] { padding: 0 8px; }
  .rangeNumber { display: grid; grid-template-columns: minmax(90px,1fr) 72px; gap: 8px; align-items: center; }
  .rangeNumber input[type="range"] { width: 100%; accent-color: var(--text); }
  .list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .item { display: inline-flex; align-items: center; max-width: 100%; border: 1px solid var(--line); border-radius: 0; background: var(--panel); color: var(--text); font-size: 12px; }
  .item.selected { outline: 1px solid var(--text); }
  .name { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 6px 10px; color: var(--text); }
  button.name { border: 0; border-right: 1px solid var(--line); border-radius: 0; background: transparent; text-align: left; }
  button.remove { width: 30px; min-height: 30px; border: 0; border-radius: 0; background: transparent; color: var(--text); font-weight: 700; }
  .actions { display: flex; gap: 10px; }
  #status { display: none; }
  .charRow { width: 100%; border: 1px solid var(--line); background: var(--panel); margin-top: 6px; }
  .charRow.selected { outline: 1px solid var(--text); }
  .charHead { display: flex; align-items: center; }
  button.charName { flex: 1; min-height: 34px; padding: 6px 10px; border: 0; border-right: 1px solid var(--line); border-radius: 0; background: transparent; color: var(--text); text-align: left; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button.charRemove { width: 32px; min-height: 34px; border: 0; border-radius: 0; background: transparent; color: var(--text); font-weight: 700; }
  .charAnims { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; border-top: 1px solid var(--line); }
  .charAnimEmpty { font-size: 11px; color: var(--text); opacity: .5; }
  .animChip { display: inline-flex; align-items: center; gap: 4px; max-width: 100%; padding: 2px 4px 2px 8px; border: 1px solid var(--line); background: var(--stage); font-size: 11px; }
  .animChip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .animChip button { border: 0; background: transparent; color: var(--text); font-weight: 700; padding: 0 4px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="toggle" aria-label="panel"><img src="img/menu.svg" alt="menu"></button>
<div id="toolbar">
<button id="dataToggle" class="menuToggle" aria-label="data">Data</button>
<button id="viewToggle" class="menuToggle" aria-label="view">View</button>
<button id="playbackToggle" class="menuToggle" aria-label="playback">Playback</button>
<button id="physicsToggle" class="menuToggle" aria-label="physics">Physics</button>
<button id="fxToggle" class="menuToggle" aria-label="fx">FX</button>
<button id="renderToggle" class="menuToggle" aria-label="render">Render</button>
<button id="logBtn" class="menuToggle" aria-label="log">log</button>
<button id="codeBtn" class="menuToggle" aria-label="code">Code</button>
</div>
<button id="fullscreen" aria-label="fullscreen">⛶</button>

<div id="logPanel">
  <button id="logCopy">Copy</button>
  <div id="logBox">ready</div>
</div>

<div id="codePanel">
  <div id="codeBar">
    <button id="codeApply">適用</button>
    <button id="codeClear">クリア</button>
  </div>
  <textarea id="codeBox" spellcheck="false" placeholder="利用可能: scene, engine, activeCamera, mmdRuntime, characters, BABYLON, BABYLONMMD, onDispose(fn)"></textarea>
</div>

<div id="bar">
  <button id="physicsReset" type="button" aria-label="Physics reset"><img src="img/refresh.svg" alt="Physics reset"></button>
  <button id="play" type="button" aria-label="Play" disabled><img src="img/play.svg" alt="Play"></button>
  <input id="frame" type="number" min="0" value="0" disabled>
  <input id="seek" type="range" min="0" max="0" value="0" step="1" disabled>
  <span id="frameTotal">/ 0</span>
</div>
<div id="fps">0 fps</div>

<section id="panel" class="open">
  <div class="field">
    <i>Import</i>
    <div class="pick">
      <button class="file" id="fileBtn">Folder</button>
      <button class="file" id="zipBtn">Zip</button>
    </div>
    <input id="fileInput" type="file" accept=".pmx,.vmd,.mp3,.wav,.png,.jpg,.jpeg,.bmp,.tga,.gif,.dds,.sph,.spa,.tif,.tiff" multiple webkitdirectory>
    <input id="zipInput" type="file" accept=".zip">
    <div class="list" id="folderList"></div>
  </div>
  <div class="field">
    <i>Models [pmx] — tap to add</i>
    <div class="list" id="modelPool"></div>
  </div>
  <div class="field">
    <i>Scene characters</i>
    <div class="list" id="characterList"></div>
  </div>
  <div class="field">
    <i>Transform (selected) — pos / rot°</i>
    <div class="pick">
      <span>Gizmo</span>
      <select id="gizmoMode"><option value="on" selected>ON</option><option value="off">OFF</option></select>
    </div>
    <div class="transformGrid">
      <label>X<input id="posX" type="number" step="0.1" value="0"></label>
      <label>Y<input id="posY" type="number" step="0.1" value="0"></label>
      <label>Z<input id="posZ" type="number" step="0.1" value="0"></label>
      <label>RX<input id="rotX" type="number" step="1" value="0"></label>
      <label>RY<input id="rotY" type="number" step="1" value="0"></label>
      <label>RZ<input id="rotZ" type="number" step="1" value="0"></label>
    </div>
  </div>
  <div class="field">
    <i>Animations [vmd] — tap to add to selected</i>
    <div class="list" id="motionPool"></div>
  </div>
  <div id="status"></div>
</section>

<section id="settingsPanel">
  <div id="viewMenu" class="menuPage active">
    <div class="qualityBlock">
      <label class="settingRow"><span>Floor</span>
        <select id="floorMode"><option value="on" selected>ON</option><option value="off">OFF</option></select>
      </label>
      <label class="settingRow"><span>Background</span>
        <input id="backgroundColor" type="color" value="#262b31">
      </label>
      <label class="settingRow"><span>FPS</span>
        <select id="fpsMode"><option value="on" selected>ON</option><option value="off">OFF</option></select>
      </label>
      <label class="settingRow"><span>Pixel ratio</span>
        <select id="pixelRatio"><option value="1">1.0</option><option value="1.5">1.5</option><option value="2">2.0</option><option value="device" selected>Device</option></select>
      </label>
      <label class="settingRow"><span>Ambient light</span>
        <span class="rangeNumber">
          <input id="ambientLightLevelRange" type="range" min="0" max="2" step="0.05" value="0.7">
          <input id="ambientLightLevel" type="number" min="0" max="2" step="0.05" value="0.7">
        </span>
      </label>
      <label class="settingRow"><span>Directional light</span>
        <span class="rangeNumber">
          <input id="directionalLightLevelRange" type="range" min="0" max="2" step="0.05" value="0.6">
          <input id="directionalLightLevel" type="number" min="0" max="2" step="0.05" value="0.6">
        </span>
      </label>
      <label class="settingRow"><span>ライト回転X</span>
        <span class="rangeNumber">
          <input id="dirRotXRange" type="range" min="-180" max="180" step="1" value="0">
          <input id="dirRotX" type="number" min="-180" max="180" step="1" value="0">
        </span>
      </label>
      <label class="settingRow"><span>ライト回転Y</span>
        <span class="rangeNumber">
          <input id="dirRotYRange" type="range" min="-180" max="180" step="1" value="0">
          <input id="dirRotY" type="number" min="-180" max="180" step="1" value="0">
        </span>
      </label>
      <label class="settingRow"><span>ライト回転Z</span>
        <span class="rangeNumber">
          <input id="dirRotZRange" type="range" min="-180" max="180" step="1" value="0">
          <input id="dirRotZ" type="number" min="-180" max="180" step="1" value="0">
        </span>
      </label>
            <label class="settingRow"><span>Self shadow</span>
        <select id="selfShadowMode"><option value="off" selected>OFF</option><option value="on">ON</option></select>
      </label>
      <label class="settingRow"><span>Normal shadow</span>
        <select id="normalShadowMode"><option value="off" selected>OFF</option><option value="on">ON</option></select>
      </label>
    </div>
  </div>
  <div id="playbackMenu" class="menuPage">
    <div class="qualityBlock">
      <label class="settingRow"><span>Speed</span>
        <span class="rangeNumber">
          <input id="playbackSpeedRange" type="range" min="0.1" max="3" step="0.1" value="1">
          <input id="playbackSpeed" type="number" min="0.1" max="3" step="0.1" value="1">
        </span>
      </label>
      <label class="settingRow"><span>Volume</span>
        <span class="rangeNumber">
          <input id="audioVolumeRange" type="range" min="0" max="1" step="0.05" value="1">
          <input id="audioVolume" type="number" min="0" max="1" step="0.05" value="1">
        </span>
      </label>
      <label class="settingRow"><span>Camera</span>
        <select id="cameraSelect"><option value="free" selected>None</option></select>
      </label>
      <label class="settingRow"><span>Audio</span>
        <select id="audioSelect"><option value="none" selected>None</option></select>
      </label>
      <label class="settingRow"><span>Model FPS</span>
        <select id="modelFpsLimit">
          <option value="off" selected>OFF</option>
          <option value="8">8</option>
          <option value="12">12</option>
          <option value="15">15</option>
          <option value="24">24</option>
          <option value="30">30</option>
        </select>
      </label>
    </div>
  </div>
  <div id="physicsMenu" class="menuPage">
    <div class="qualityBlock">
      <label class="settingRow"><span>Mode</span>
        <select id="physicsMode"><option value="on" selected>ON</option><option value="off">OFF</option></select>
      </label>
      <label class="settingRow"><span>IK</span>
        <select id="ikMode"><option value="on" selected>ON</option><option value="off">OFF</option></select>
      </label>
      <label class="settingRow"><span>Eval type</span>
        <select id="evalType">
          <option value="buffered" selected>Buffered (multi)</option>
          <option value="immediate">Immediate (single)</option>
        </select>
      </label>
      <label class="settingRow"><span>Use delta</span>
        <select id="useDelta"><option value="on" selected>ON</option><option value="off">OFF</option></select>
      </label>
      <label class="settingRow"><span>Physics FPS</span>
        <select id="physicsFps">
          <option value="30">30</option>
          <option value="60" selected>60</option>
          <option value="90">90</option>
          <option value="120">120</option>
          <option value="150">150</option>
          <option value="180">180</option>
          <option value="210">210</option>
          <option value="240">240</option>
        </select>
      </label>
      <label class="settingRow"><span>Substeps</span>
        <span class="rangeNumber">
          <input id="substepsRange" type="range" min="1" max="10" step="1" value="3">
          <input id="substeps" type="number" min="1" max="10" step="1" value="3">
        </span>
      </label>
    </div>
  </div>

  <div id="fxMenu" class="menuPage">
    <div class="qualityBlock">
      <label class="settingRow"><span>Character Toon</span>
        <select id="characterToonMode"><option value="off" selected>OFF</option><option value="flat">Flat Toon</option></select>
      </label>
      <label class="settingRow"><span>Flat Toon Brightness</span>
        <span class="rangeNumber">
          <input id="flatToonBrightnessRange" type="range" min="0" max="5" step="0.05" value="1">
          <input id="flatToonBrightness" type="number" min="0" max="5" step="0.05" value="1">
        </span>
      </label>
      <label class="settingRow"><span>Glow</span>
        <select id="glowMode"><option value="off" selected>OFF</option><option value="on">ON</option></select>
      </label>
      <label class="settingRow"><span>Glow強度</span>
        <span class="rangeNumber">
          <input id="glowIntensityRange" type="range" min="0" max="3" step="0.1" value="1">
          <input id="glowIntensity" type="number" min="0" max="3" step="0.1" value="1">
        </span>
      </label>
      <label class="settingRow"><span>Glowぼかし</span>
        <span class="rangeNumber">
          <input id="glowBlurRange" type="range" min="8" max="128" step="1" value="32">
          <input id="glowBlur" type="number" min="8" max="128" step="1" value="32">
        </span>
      </label>
      <label class="settingRow"><span>Bloom</span>
        <select id="bloomMode"><option value="off" selected>OFF</option><option value="on">ON</option></select>
      </label>
      <label class="settingRow"><span>Bloom強度</span>
        <span class="rangeNumber">
          <input id="bloomWeightRange" type="range" min="0" max="2" step="0.05" value="0.6">
          <input id="bloomWeight" type="number" min="0" max="2" step="0.05" value="0.6">
        </span>
      </label>
      <label class="settingRow"><span>Bloom閾値</span>
        <span class="rangeNumber">
          <input id="bloomThresholdRange" type="range" min="0" max="1" step="0.05" value="0.8">
          <input id="bloomThreshold" type="number" min="0" max="1" step="0.05" value="0.8">
        </span>
      </label>
      <label class="settingRow"><span>DOF</span>
        <select id="dofMode"><option value="off" selected>OFF</option><option value="on">ON</option></select>
      </label>
      <label class="settingRow"><span>DOF焦点(mm)</span>
        <span class="rangeNumber">
          <input id="dofFocusRange" type="range" min="100" max="20000" step="100" value="2000">
          <input id="dofFocus" type="number" min="100" max="20000" step="100" value="2000">
        </span>
      </label>
      <label class="settingRow"><span>DOFボケ量</span>
        <span class="rangeNumber">
          <input id="dofApertureRange" type="range" min="0" max="0.5" step="0.01" value="0.1">
          <input id="dofAperture" type="number" min="0" max="0.5" step="0.01" value="0.1">
        </span>
      </label>
    </div>
  </div>

  <div id="renderMenu" class="menuPage">
    <div class="qualityBlock">
      <label class="settingRow"><span>Render FPS</span>
        <select id="renderFps"><option value="30" selected>30</option><option value="60">60</option></select>
      </label>
      <label class="settingRow"><span>Bitrate</span>
        <select id="renderBitrate"><option value="4000000">4 Mbps</option><option value="8000000" selected>8 Mbps</option><option value="12000000">12 Mbps</option><option value="20000000">20 Mbps</option><option value="30000000">30 Mbps</option></select>
      </label>
      <label class="settingRow"><span>MP4 H.264</span>
        <button id="renderMp4" class="file" type="button">Render</button>
      </label>
    </div>
  </div>

  <div id="dataMenu" class="menuPage">
    <div class="actions">
      <button id="studioSave" class="act">Save</button>
      <button id="studioRestore" class="act">Restore</button>
      <button id="reset" class="act" disabled>Reset</button>
    </div>
    <div class="actions">
      <button id="projectExport" class="act">Export</button>
      <button id="projectImport" class="act">Import</button>
    </div>
    <input id="projectImportInput" type="file" accept=".json,.txt,application/json,text/plain">
  </div>
</section>

<script>
if (typeof SharedArrayBuffer === 'undefined') {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./coi-serviceworker.js').then(function(reg) {
      if (!reg.active) location.reload();
    });
  }
}
</script>
<script src="lib/babylon.js"></script>
<script src="lib/babylon.mmd.min.js"></script>
<script src="lib/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
